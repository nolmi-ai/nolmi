name: Feature Request
description: Suggest a new capability or improvement
title: "[Feature]: "
labels: ["feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Twin-Lab has an opinionated roadmap — check `docs/ROADMAP.md` first to see if your idea is already planned.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the pain point? What can't you do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would solve this for you?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why they don't fit.

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Concrete scenario — who uses this, when, and what's the outcome?
    validations:
      required: true
