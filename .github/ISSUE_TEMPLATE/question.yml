name: Question
description: Ask about usage, configuration, or unclear behavior
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check `docs/DEPLOYMENT.md` and existing issues.

  - type: textarea
    id: question
    attributes:
      label: What do you want to know?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Context helps — what docs did you read, what did you try, what didn't work?

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: e.g. cf2ccf6 or v0.1.0
