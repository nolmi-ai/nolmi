name: Bug Report
description: Something doesn't work as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail, the faster it can be fixed.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can someone else trigger this?
      placeholder: |
        1. Run `pnpm dev`
        2. Open localhost:3000
        3. Click ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Docker version, deployment mode (local dev vs self-hosted)
      placeholder: |
        - OS: macOS 14.5
        - Node: 22.x
        - Deployment: Docker Compose (self-hosted VPS)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Runtime logs, browser console errors, etc.
      render: shell

  - type: input
    id: commit
    attributes:
      label: Commit hash or version
      placeholder: e.g. cf2ccf6 or v0.1.0
